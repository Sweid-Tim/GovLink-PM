<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上海铝业行业协会 · 德奥匈出访路线</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif; }
#map { height: 100%; width: 100%; }

/* Title bar */
.title-bar {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 1000; background: rgba(255,255,255,0.95);
  padding: 12px 32px; border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  text-align: center; pointer-events: none;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0,0,0,0.06);
}
.title-bar h2 { font-size: 18px; color: #1a1a2e; letter-spacing: 1px; }
.title-bar .subtitle { font-size: 13px; color: #666; margin-top: 3px; }

/* Legend */
.legend {
  position: absolute; bottom: 30px; right: 20px;
  z-index: 1000; background: rgba(255,255,255,0.95);
  padding: 14px 18px; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  font-size: 12px; line-height: 1.9;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0,0,0,0.06);
  min-width: 160px;
}
.legend-title { font-weight: bold; font-size: 13px; color: #1a1a2e; margin-bottom: 4px; }
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-line { display: inline-block; height: 3px; border-radius: 2px; flex-shrink: 0; }
.legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(0,0,0,0.2); }

/* Custom marker styles */
.marker-default {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 13px; color: white;
  border: 2.5px solid rgba(255,255,255,0.9);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  cursor: pointer;
  transition: transform 0.15s;
}
.marker-default:hover { transform: scale(1.12); }
.marker-start {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 16px; color: black;
  border: 3px solid rgba(255,255,255,0.95);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  cursor: pointer;
  transition: transform 0.15s;
}
.marker-start:hover { transform: scale(1.12); }

/* Popup styling */
.leaflet-popup-content-wrapper {
  border-radius: 10px; padding: 0;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18);
}
.leaflet-popup-content {
  margin: 0; padding: 0;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.popup-body { padding: 14px 16px; min-width: 200px; }
.popup-city { font-size: 17px; font-weight: bold; color: #1a1a2e; margin-bottom: 2px; }
.popup-country { font-size: 12px; color: #888; margin-bottom: 8px; }
.popup-seq { font-size: 12px; color: #555; margin-bottom: 4px; }
.popup-seq span { display: inline-block; background: #eee; padding: 1px 8px; border-radius: 10px; }
.popup-note { font-size: 13px; color: #e74c3c; margin-top: 4px; line-height: 1.5; }
.popup-day { font-size: 12px; color: #888; margin-top: 6px; padding-top: 6px; border-top: 1px solid #eee; }
.popup-day span { display: inline-block; background: #f0f4ff; padding: 1px 8px; border-radius: 10px; color: #4361ee; }

/* Day summary panel */
.day-panel {
  position: absolute; top: 90px; left: 20px;
  z-index: 1000; background: rgba(255,255,255,0.95);
  padding: 12px 16px; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  font-size: 11px; line-height: 1.7;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0,0,0,0.06);
  max-width: 200px;
}
.day-panel-title { font-weight: bold; font-size: 12px; color: #1a1a2e; margin-bottom: 4px; }
.day-item { display: flex; align-items: center; gap: 6px; }
.day-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Responsive */
@media (max-width: 768px) {
  .title-bar { top: 10px; padding: 8px 16px; width: 90%; }
  .title-bar h2 { font-size: 15px; }
  .day-panel { display: none; }
  .legend { font-size: 11px; padding: 10px 14px; }
}
</style>
</head>
<body>

<div id="map"></div>

<div class="title-bar">
  <h2>🗺️ 上海铝业行业协会 · 德国 + 奥地利 + 匈牙利 出访路线</h2>
  <div class="subtitle">2026年10月5日 — 10月15日 · 全程11天 · 途经15城</div>
</div>

<div class="legend">
  <div class="legend-title">图例</div>
  <div class="legend-item">
    <span class="legend-dot" style="background:#f1c40f;"></span>
    <span>首站（上海出发）</span>
  </div>
  <div class="legend-item">
    <span class="legend-dot" style="background:#4361ee;"></span>
    <span>途经城市</span>
  </div>
  <div class="legend-item">
    <span class="legend-dot" style="background:#e74c3c;"></span>
    <span>住宿城市</span>
  </div>
  <div class="legend-item">
    <span class="legend-line" style="width:24px; background:#4361ee;"></span>
    <span>自驾路线</span>
  </div>
  <div class="legend-item">
    <span class="legend-line" style="width:24px; background:#e74c3c; border-top:2px dashed #e74c3c; height:0;"></span>
    <span style="margin-left:-4px;">国际航班</span>
  </div>
</div>

<div class="day-panel">
  <div class="day-panel-title">📅 行程速览</div>
  <div class="day-item"><span class="day-dot" style="background:#3498db;"></span> Day1 上海→法兰克福→科隆</div>
  <div class="day-item"><span class="day-dot" style="background:#e67e22;"></span> Day2-3 杜塞尔多夫铝展</div>
  <div class="day-item"><span class="day-dot" style="background:#9b59b6;"></span> Day3 克罗伊茨塔尔</div>
  <div class="day-item"><span class="day-dot" style="background:#1abc9c;"></span> Day4 BASF→斯图加特</div>
  <div class="day-item"><span class="day-dot" style="background:#e74c3c;"></span> Day5 麦琴根→慕尼黑</div>
  <div class="day-item"><span class="day-dot" style="background:#e74c3c;"></span> Day6 萨尔茨堡→哈尔施塔特</div>
  <div class="day-item"><span class="day-dot" style="background:#2ecc71;"></span> Day7 瓦豪酒庄→维也纳</div>
  <div class="day-item"><span class="day-dot" style="background:#8e44ad;"></span> Day8-9 维也纳→布达佩斯</div>
  <div class="day-item"><span class="day-dot" style="background:#3498db;"></span> Day10 布达佩斯→上海</div>
</div>

<script>
(function() {
  // ============================================================
  // 城市数据
  // ============================================================
  const cities = [
    {
      id: 1, name: "上海", nameEn: "Shanghai",
      country: "中国", countryEn: "China",
      lat: 31.2304, lng: 121.4737,
      note: "✈️ 出发城市 · MU219 PVG→FRA 00:05→06:05",
      day: "Day 1 (10/5)",
      type: "start"
    },
    {
      id: 2, name: "法兰克福", nameEn: "Frankfurt",
      country: "德国", countryEn: "Germany",
      lat: 50.1109, lng: 8.6821,
      note: "✈️ 抵达机场 · 转乘车辆前往科隆（190km）",
      day: "Day 1 (10/5)",
      type: "airport"
    },
    {
      id: 3, name: "科隆", nameEn: "Cologne (Köln)",
      country: "德国", countryEn: "Germany",
      lat: 50.9375, lng: 6.9603,
      note: "🏨 住宿城市 · 科隆大教堂、罗马广场、莱茵河谷",
      day: "Day 1~3 (10/5-7)",
      type: "stay"
    },
    {
      id: 4, name: "杜塞尔多夫", nameEn: "Düsseldorf",
      country: "德国", countryEn: "Germany",
      lat: 51.2277, lng: 6.7735,
      note: "🏭 ALUMINIUM 德国铝工业展览会<br>Day2全天观展 · Day3半天观展",
      day: "Day 2~3 (10/6-7)",
      type: "visit"
    },
    {
      id: 5, name: "克罗伊茨塔尔", nameEn: "Kreuztal",
      country: "德国", countryEn: "Germany",
      lat: 50.9675, lng: 7.9885,
      note: "🏭 参访 HoDforming GmbH<br>金属热成形技术 · 超轻量化解决方案",
      day: "Day 3 (10/7)",
      type: "visit"
    },
    {
      id: 6, name: "路德维希港", nameEn: "Ludwigshafen",
      country: "德国", countryEn: "Germany",
      lat: 49.4774, lng: 8.4450,
      note: "🏭 参访 Achenbach Buschhütten<br>全球最大一体化化工园区 BASF",
      day: "Day 4 (10/8)",
      type: "visit"
    },
    {
      id: 7, name: "布勒", nameEn: "Bullay",
      country: "德国", countryEn: "Germany",
      lat: 50.0522, lng: 7.1367,
      note: "🏭 参访 Pressta-Eisele GmbH<br>铝加工机械领先供应商",
      day: "Day 4 (10/8)",
      type: "visit"
    },
    {
      id: 8, name: "斯图加特", nameEn: "Stuttgart",
      country: "德国", countryEn: "Germany",
      lat: 48.7758, lng: 9.1829,
      note: "🏨 住宿城市",
      day: "Day 4 (10/8)",
      type: "stay"
    },
    {
      id: 9, name: "麦琴根", nameEn: "Metzingen",
      country: "德国", countryEn: "Germany",
      lat: 48.5369, lng: 9.2869,
      note: "🛍️ 欧洲奥特莱斯之都 · 200+国际品牌",
      day: "Day 5 (10/9)",
      type: "visit"
    },
    {
      id: 10, name: "慕尼黑", nameEn: "Munich (München)",
      country: "德国", countryEn: "Germany",
      lat: 48.1351, lng: 11.5820,
      note: "🏨 住宿城市 · 皇家啤酒屋 · 400年酿造传承",
      day: "Day 5 (10/9)",
      type: "stay"
    },
    {
      id: 11, name: "萨尔茨堡", nameEn: "Salzburg",
      country: "奥地利", countryEn: "Austria",
      lat: 47.8095, lng: 13.0550,
      note: "🏰 萨尔茨堡要塞、萨尔茨堡老城",
      day: "Day 6 (10/10)",
      type: "visit"
    },
    {
      id: 12, name: "哈尔施塔特", nameEn: "Hallstatt",
      country: "奥地利", countryEn: "Austria",
      lat: 47.5625, lng: 13.6495,
      note: "🏨 住宿 · 世界最美湖畔小镇 · UNESCO世界遗产",
      day: "Day 6 (10/10)",
      type: "stay"
    },
    {
      id: 13, name: "瓦豪河谷", nameEn: "Wachau Valley",
      country: "奥地利", countryEn: "Austria",
      lat: 48.3950, lng: 15.5200,
      note: "🍷 世界遗产河谷 · 绿维特利纳与雷司令品鉴",
      day: "Day 7 (10/11)",
      type: "visit"
    },
    {
      id: 14, name: "维也纳", nameEn: "Vienna (Wien)",
      country: "奥地利", countryEn: "Austria",
      lat: 48.2082, lng: 16.3738,
      note: "🏨 住宿 · 美泉宫、金色大厅<br>🏭 参访奥地利非铁金属工业协会",
      day: "Day 7~8 (10/11-12)",
      type: "stay"
    },
    {
      id: 15, name: "布达佩斯", nameEn: "Budapest",
      country: "匈牙利", countryEn: "Hungary",
      lat: 47.4979, lng: 19.0402,
      note: "🏨 住宿 · 渔人堡、布达城堡、多瑙河游船<br>🏭 参访 Flansch-Tech Kft.<br>✈️ Day10 MU8640 BUD→PVG 12:30→05:35+1",
      day: "Day 8~10 (10/12-14)",
      type: "stay"
    }
  ];

  // ============================================================
  // Route connections: [fromIndex, toIndex, type, color]
  // ============================================================
  const routes = [
    // Flight out
    [0, 1, "flight", "#3498db"],
    // Day 1: Frankfurt → Cologne
    [1, 2, "drive", "#e74c3c"],
    // Day 2: Cologne → Düsseldorf → Cologne (round trip)
    [2, 3, "drive", "#e67e22"],
    [3, 2, "drive", "#e67e22"],
    // Day 3: Cologne → Düsseldorf → Kreuztal
    [2, 3, "drive", "#e67e22"],
    [3, 4, "drive", "#9b59b6"],
    // Day 4: Kreuztal → Ludwigshafen → Bullay → Stuttgart
    [4, 5, "drive", "#1abc9c"],
    [5, 6, "drive", "#1abc9c"],
    [6, 7, "drive", "#1abc9c"],
    // Day 5: Stuttgart → Metzingen → Munich
    [7, 8, "drive", "#e74c3c"],
    [8, 9, "drive", "#e74c3c"],
    // Day 6: Munich → Salzburg → Hallstatt
    [9, 10, "drive", "#e74c3c"],
    [10, 11, "drive", "#e74c3c"],
    // Day 7: Hallstatt → Wachau → Vienna
    [11, 12, "drive", "#2ecc71"],
    [12, 13, "drive", "#2ecc71"],
    // Day 8-9: Vienna → Budapest
    [13, 14, "drive", "#8e44ad"],
    // Flight back
    [14, 0, "flight", "#3498db"],
  ];

  // ============================================================
  // Initialize map
  // ============================================================
  const map = L.map('map', {
    center: [49.0, 14.0],
    zoom: 6,
    zoomControl: true,
    attributionControl: true
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 18
  }).addTo(map);

  // ============================================================
  // Draw route lines
  // ============================================================
  routes.forEach(function(route) {
    const fromCity = cities[route[0]];
    const toCity = cities[route[1]];
    const type = route[2];
    const color = route[3];

    const latlngs = [[fromCity.lat, fromCity.lng], [toCity.lat, toCity.lng]];

    if (type === "flight") {
      L.polyline(latlngs, {
        color: color,
        weight: 2.5,
        opacity: 0.5,
        dashArray: "12, 10",
        lineJoin: "round"
      }).addTo(map);
    } else {
      L.polyline(latlngs, {
        color: color,
        weight: 4,
        opacity: 0.85,
        lineJoin: "round"
      }).addTo(map);
    }
  });

  // ============================================================
  // City markers
  // ============================================================
  // Track unique city names to avoid duplicates
  const seenCities = {};

  cities.forEach(function(city) {
    const key = city.name + city.country;
    if (seenCities[key]) {
      // Skip duplicate marker but still show in route
      return;
    }
    seenCities[key] = true;

    // Create custom marker div
    const markerSize = city.type === "start" ? 38 : 32;
    const bgColor = city.type === "start" ? "#f1c40f" :
                    city.type === "stay" ? "#e74c3c" :
                    "#4361ee";
    const textColor = city.type === "start" ? "#000" : "#fff";
    const borderColor = city.type === "start" ? "rgba(241,196,15,0.8)" : "rgba(255,255,255,0.9)";
    const fontSize = city.type === "start" ? 16 : 13;

    const markerDiv = L.divIcon({
      className: '',
      html: '<div class="' + (city.type === "start" ? 'marker-start' : 'marker-default') +
            '" style="background:' + bgColor + ';color:' + textColor + ';' +
            'width:' + markerSize + 'px;height:' + markerSize + 'px;' +
            'font-size:' + fontSize + 'px;border-color:' + borderColor + ';">' +
            city.id + '</div>',
      iconSize: [markerSize, markerSize],
      iconAnchor: [markerSize/2, markerSize/2],
      popupAnchor: [0, -markerSize/2 - 8]
    });

    // Build popup content
    var popupContent = '<div class="popup-body">';
    popupContent += '<div class="popup-city">' + city.name + ' <span style="font-size:13px;font-weight:normal;color:#888;">' + city.nameEn + '</span></div>';
    popupContent += '<div class="popup-country">' + city.country + ' · ' + city.countryEn + '</div>';
    popupContent += '<div class="popup-seq"><span>#' + city.id + ' · 第' + city.id + '站</span></div>';
    popupContent += '<div class="popup-day"><span>' + city.day + '</span></div>';
    if (city.note) {
      popupContent += '<div class="popup-note">' + city.note + '</div>';
    }
    popupContent += '</div>';

    // Determine marker z-index offset so start marker is on top
    const zIndexOffset = city.type === "start" ? 1000 : (city.type === "stay" ? 500 : 0);

    L.marker([city.lat, city.lng], {
      icon: markerDiv,
      zIndexOffset: zIndexOffset
    }).addTo(map)
      .bindPopup(popupContent, { maxWidth: 320, className: 'custom-popup' });
  });

  // ============================================================
  // Fit map to show all markers
  // ============================================================
  // For Europe focus, we zoom to the Europe part
  const europeBounds = L.latLngBounds(
    L.latLng(46.0, 5.0),
    L.latLng(52.5, 21.0)
  );
  map.fitBounds(europeBounds, { padding: [40, 40] });

  // ============================================================
  // Add scale bar
  // ============================================================
  L.control.scale({ position: 'bottomleft', metric: true, imperial: false }).addTo(map);

  console.log('Map initialized with ' + cities.length + ' cities and ' + routes.length + ' route segments.');

})();
</script>
</body>
</html>
