<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>南通工业招商局 韩国行程地图 | 2026.6.8-6.12</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif; background: #f5f5f5; }
#header {
  background: linear-gradient(135deg, #1a237e, #283593);
  color: white; padding: 20px 24px; text-align: center;
}
#header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
#header p { font-size: 14px; opacity: 0.85; }
#map { height: calc(100vh - 90px); width: 100%; }

/* Legend */
.legend {
  background: white; padding: 12px 14px; border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 13px; line-height: 1.8;
  max-height: 400px; overflow-y: auto;
}
.legend h4 { margin: 0 0 6px; font-size: 14px; }
.legend .row { display: flex; align-items: center; gap: 6px; }
.legend .color-bar { width: 24px; height: 4px; border-radius: 2px; flex-shrink: 0; }
.legend .dash-bar { width: 24px; height: 0; border-top: 3px dashed #666; flex-shrink: 0; }

/* Custom markers */
.marker-label {
  background: #1a237e; color: white; width: 26px; height: 26px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: bold; border: 2px solid white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer;
}
.marker-label.day1 { background: #e53935; }
.marker-label.day2 { background: #1e88e5; }
.marker-label.day3 { background: #43a047; }
.marker-label.day4 { background: #fb8c00; }
.marker-label.day5 { background: #8e24aa; }
.marker-label.flight { background: #78909c; width: 30px; height: 30px; font-size: 14px; }

/* Popup */
.popup-content { font-size: 13px; line-height: 1.6; min-width: 200px; }
.popup-content h3 { font-size: 15px; margin-bottom: 4px; color: #1a237e; }
.popup-content .tag {
  display: inline-block; padding: 1px 8px; border-radius: 10px;
  font-size: 11px; color: white; margin-bottom: 6px;
}
.popup-content .tag.day1 { background: #e53935; }
.popup-content .tag.day2 { background: #1e88e5; }
.popup-content .tag.day3 { background: #43a047; }
.popup-content .tag.day4 { background: #fb8c00; }
.popup-content .tag.day5 { background: #8e24aa; }
.popup-content .addr { color: #666; font-size: 12px; margin-top: 2px; }
.popup-content .icon { margin-right: 4px; }
</style>
</head>
<body>

<div id="header">
  <h1>🗺️ 南通工业招商局 · 韩国行程路线图</h1>
  <p>2026年6月8日（周一）— 6月12日（周五） | 5天4城 · 7家企业拜访</p>
</div>

<div id="map"></div>

<script>
// ============================================================
// 1. LOCATIONS
// ============================================================
const POI = {
  // ---- Day 1: 6/8 Mon ----
  shanghai:     { coords: [31.1979, 121.3363], name: '上海虹桥机场',         en: 'Shanghai Hongqiao', day: 1, type: 'flight', tag: '出发',     detail: 'MU511 08:05→11:00' },
  gimpo:        { coords: [37.5597, 126.7945], name: '首尔金浦机场',         en: 'Seoul Gimpo',       day: 1, type: 'flight', tag: '抵达',     detail: 'MU511 08:05→11:00' },
  hwaseong:     { coords: [37.2070, 127.0210], name: '科尔斯泰克 CoorsTek',  en: 'CoorsTek',          day: 1, type: 'visit',  tag: '🔹 拜访', detail: '경기도 화성시 삼성1로5길 32' },
  seoul_stay1:  { coords: [37.5665, 126.9780], name: '首尔（住宿）',         en: 'Seoul',             day: 1, type: 'stay',   tag: '🏨 住宿', detail: '首尔市区酒店' },

  // ---- Day 2: 6/9 Tue ----
  yjc:          { coords: [36.9920, 127.0880], name: '益嘉成半导体 YJC',     en: 'YJC',               day: 2, type: 'visit',  tag: '🔹 拜访', detail: '韩国平泽（暂定）' },
  sk_enpulse:   { coords: [37.0085, 127.0620], name: 'SK Enpulse 爱思开恩普尔', en: 'SK Enpulse',     day: 2, type: 'visit',  tag: '🔹 拜访', detail: '경기도 평택시 경기대로 1043' },
  usystem:      { coords: [37.1030, 127.1090], name: '尤式系统 U-System',    en: 'U-System',          day: 2, type: 'visit',  tag: '🔹 拜访', detail: '경기도 평택시 진위면 마산6로 30' },
  pyeongtaek_stay: { coords: [36.9920, 127.0880], name: '平泽（住宿）',       en: 'Pyeongtaek',        day: 2, type: 'stay',   tag: '🏨 住宿', detail: '平泽市区酒店' },

  // ---- Day 3: 6/10 Wed ----
  flc:          { coords: [36.8151, 127.1139], name: '法兰科 FLC',           en: 'FLC',               day: 3, type: 'visit',  tag: '🔹 拜访', detail: '韩国天安（暂定）' },
  winback:      { coords: [37.3422, 127.9194], name: '赢百客 WINBACK',       en: 'WINBACK',           day: 3, type: 'visit',  tag: '🔹 拜访', detail: '韩国原州（暂定）' },
  wonju_stay:   { coords: [37.3422, 127.9194], name: '原州（住宿）',          en: 'Wonju',             day: 3, type: 'stay',   tag: '🏨 住宿', detail: '原州市区酒店' },

  // ---- Day 4: 6/11 Thu ----
  asta:         { coords: [37.2874, 127.0518], name: '阿斯塔 ASTA',          en: 'ASTA',              day: 4, type: 'visit',  tag: '🔹 拜访', detail: '경기도 수원시 영통구 광교로 145' },
  seoul_stay2:  { coords: [37.5665, 126.9780], name: '首尔（住宿）',         en: 'Seoul',             day: 4, type: 'stay',   tag: '🏨 住宿', detail: '首尔市区酒店' },

  // ---- Day 5: 6/12 Fri ----
  wonik:        { coords: [37.5700, 126.9850], name: '圆益半导体 Wonik QnC', en: 'Wonik QnC',         day: 5, type: 'visit',  tag: '🔹 拜访', detail: '경북 구미시 옥계2공단로 117\n（于首尔会面）' },
};

// ============================================================
// 2. ROUTE POLYLINES (by day)
// ============================================================
const DAY_COLORS = {
  1: { stroke: '#e53935', fill: '#ef9a9a', label: 'Day 1 · 6/8（周一）' },
  2: { stroke: '#1e88e5', fill: '#90caf9', label: 'Day 2 · 6/9（周二）' },
  3: { stroke: '#43a047', fill: '#a5d6a7', label: 'Day 3 · 6/10（周三）' },
  4: { stroke: '#fb8c00', fill: '#ffcc80', label: 'Day 4 · 6/11（周四）' },
  5: { stroke: '#8e24aa', fill: '#ce93d8', label: 'Day 5 · 6/12（周五）' },
};

const routes = [
  // Day 1 (red): Shanghai ✈ Gimpo 🚗 Hwaseong 🚗 Seoul
  {
    day: 1, dash: true,
    points: [POI.shanghai.coords, POI.gimpo.coords],
    label: '✈️ MU511 上海→首尔'
  },
  {
    day: 1, dash: false,
    points: [POI.gimpo.coords, POI.hwaseong.coords, POI.seoul_stay1.coords],
    label: '🚗 金浦→华城→首尔'
  },

  // Day 2 (blue): Seoul 🚗 Pyeongtaek (3 companies)
  {
    day: 2, dash: false,
    points: [POI.seoul_stay1.coords, POI.yjc.coords, POI.sk_enpulse.coords, POI.usystem.coords, POI.pyeongtaek_stay.coords],
    label: '🚗 首尔→平泽（3家企业）'
  },

  // Day 3 (green): Pyeongtaek 🚗 Cheonan 🚗 Wonju
  {
    day: 3, dash: false,
    points: [POI.pyeongtaek_stay.coords, POI.flc.coords, POI.winback.coords, POI.wonju_stay.coords],
    label: '🚗 平泽→天安→原州'
  },

  // Day 4 (orange): Wonju 🚗 Suwon 🚗 Seoul
  {
    day: 4, dash: false,
    points: [POI.wonju_stay.coords, POI.asta.coords, POI.seoul_stay2.coords],
    label: '🚗 原州→水原→首尔'
  },

  // Day 5 (purple): Seoul meeting ✈ Shanghai
  {
    day: 5, dash: false,
    points: [POI.seoul_stay2.coords, POI.wonik.coords],
    label: '🚗 首尔（Wonik QnC会面）'
  },
  {
    day: 5, dash: true,
    points: [POI.gimpo.coords, POI.shanghai.coords],
    label: '✈️ MU8936 首尔→上海'
  },
];

// ============================================================
// 3. INIT MAP
// ============================================================
const map = L.map('map', {
  center: [36.5, 127.5],
  zoom: 8,
  zoomControl: true,
  attributionControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> | GovLink-PM',
  maxZoom: 18,
}).addTo(map);

// ============================================================
// 4. DRAW POLYLINES BY DAY
// ============================================================
const drawnGroups = {};
const allBounds = [];

routes.forEach(route => {
  const color = DAY_COLORS[route.day];
  const polyline = L.polyline(route.points, {
    color: route.dash ? '#78909c' : color.stroke,
    weight: route.dash ? 3 : 4,
    opacity: 0.85,
    dashArray: route.dash ? '10, 12' : null,
  }).addTo(map);

  polyline.bindTooltip(route.label, {
    sticky: true,
    direction: 'top',
    offset: [0, -8],
  });

  route.points.forEach(p => allBounds.push(p));

  // Arrow marker at midpoint-ish
  if (!route.dash && route.points.length >= 2) {
    const midIdx = Math.floor(route.points.length / 2);
    const mid = route.points[midIdx];
    const prev = route.points[Math.max(0, midIdx - 1)];
    const angle = Math.atan2(mid[0] - prev[0], mid[1] - prev[1]) * 180 / Math.PI;
    // We don't add arrows to keep it clean
  }
});

// ============================================================
// 5. ADD MARKERS
// ============================================================
function createNumberedIcon(num, day, type) {
  const cls = type === 'flight' ? 'flight' : 'day' + day;
  return L.divIcon({
    className: 'marker-label ' + cls,
    html: '' + num,
    iconSize: [26, 26],
    iconAnchor: [13, 13],
    popupAnchor: [0, -16],
  });
}

let markerNum = 0;
const stopOrder = [
  // Day 1
  { key: 'shanghai',    num: ++markerNum },
  { key: 'gimpo',       num: ++markerNum },
  { key: 'hwaseong',    num: ++markerNum },
  { key: 'seoul_stay1', num: ++markerNum },
  // Day 2
  { key: 'yjc',         num: ++markerNum },
  { key: 'sk_enpulse',  num: ++markerNum },
  { key: 'usystem',     num: ++markerNum },
  { key: 'pyeongtaek_stay', num: ++markerNum },
  // Day 3
  { key: 'flc',         num: ++markerNum },
  { key: 'winback',     num: ++markerNum },
  { key: 'wonju_stay',  num: ++markerNum },
  // Day 4
  { key: 'asta',        num: ++markerNum },
  { key: 'seoul_stay2', num: ++markerNum },
  // Day 5
  { key: 'wonik',       num: ++markerNum },
];

stopOrder.forEach(item => {
  const p = POI[item.key];
  if (!p) return;
  const icon = createNumberedIcon(item.num, p.day, p.type);
  const marker = L.marker(p.coords, { icon }).addTo(map);

  const dayName = ['', '周一 6/8', '周二 6/9', '周三 6/10', '周四 6/11', '周五 6/12'][p.day];

  const popupHtml = `
    <div class="popup-content">
      <span class="tag day${p.day}">${dayName}</span>
      <h3>${p.name}</h3>
      ${p.en ? '<div style="color:#888;font-size:12px">' + p.en + '</div>' : ''}
      <div class="addr">${p.detail.replace(/\n/g, '<br>')}</div>
    </div>
  `;
  marker.bindPopup(popupHtml, { maxWidth: 280 });
});

// ============================================================
// 6. FIT MAP TO ALL POINTS
// ============================================================
const bounds = L.latLngBounds(allBounds);
map.fitBounds(bounds, { padding: [50, 50] });

// ============================================================
// 7. LEGEND
// ============================================================
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<h4>图例</h4>';
  for (let d = 1; d <= 5; d++) {
    const c = DAY_COLORS[d];
    const dayNames = ['', '6/8 周一', '6/9 周二', '6/10 周三', '6/11 周四', '6/12 周五'];
    div.innerHTML += `<div class="row"><span class="color-bar" style="background:${c.stroke}"></span> ${dayNames[d]}</div>`;
  }
  div.innerHTML += `<div class="row" style="margin-top:4px"><span class="dash-bar"></span> 航班</div>`;
  div.innerHTML += `<div style="margin-top:6px;font-size:11px;color:#999">点击标记查看详情</div>`;
  return div;
};
legend.addTo(map);

// ============================================================
// 8. SCALE
// ============================================================
L.control.scale({ position: 'bottomleft', metric: true, imperial: false }).addTo(map);
</script>
</body>
</html>
