<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>昆山市外办 · 开姆尼茨公务出访路线</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif; }
#map { height: 100%; width: 100%; }

.title-bar {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 1000; background: rgba(255,255,255,0.95);
  padding: 10px 28px; border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  text-align: center; pointer-events: none;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0,0,0,0.06);
}
.title-bar h2 { font-size: 17px; color: #1a1a2e; }
.title-bar .subtitle { font-size: 12px; color: #666; margin-top: 2px; }

.legend {
  position: absolute; bottom: 30px; right: 20px;
  z-index: 1000; background: rgba(255,255,255,0.95);
  padding: 12px 16px; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  font-size: 12px; line-height: 1.9;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0,0,0,0.06);
  min-width: 150px;
}
.legend-title { font-weight: bold; font-size: 13px; color: #1a1a2e; }
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-line { display: inline-block; height: 3px; border-radius: 2px; flex-shrink: 0; }
.legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(0,0,0,0.15); }

.stay-panel {
  position: absolute; top: 85px; left: 16px;
  z-index: 1000; background: rgba(255,255,255,0.95);
  padding: 10px 14px; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  font-size: 11px; line-height: 1.7;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0,0,0,0.06);
}
.stay-title { font-weight: bold; font-size: 12px; color: #1a1a2e; margin-bottom: 2px; }
.stay-item { display: flex; align-items: center; gap: 5px; }
.stay-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.popup-body { padding: 12px 14px; min-width: 190px; }
.popup-city { font-size: 16px; font-weight: bold; color: #1a1a2e; margin-bottom: 2px; }
.popup-country { font-size: 12px; color: #888; margin-bottom: 6px; }
.popup-seq { font-size: 12px; color: #555; margin-bottom: 2px; }
.popup-seq span { display: inline-block; background: #eee; padding: 1px 8px; border-radius: 10px; }
.popup-note { font-size: 13px; color: #e74c3c; margin-top: 4px; line-height: 1.5; }
.popup-day { font-size: 12px; color: #888; margin-top: 4px; padding-top: 4px; border-top: 1px solid #eee; }
.popup-day span { display: inline-block; background: #f0f4ff; padding: 1px 8px; border-radius: 10px; color: #4361ee; }

.leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.18); }
.leaflet-popup-content { margin: 0; padding: 0; }
.marker-num {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 13px; color: white;
  border: 2.5px solid rgba(255,255,255,0.9);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  cursor: pointer; transition: transform 0.15s;
}
.marker-num:hover { transform: scale(1.12); }
.marker-start {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 16px; color: black;
  border: 3px solid rgba(255,255,255,0.95);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  cursor: pointer; transition: transform 0.15s;
}
.marker-start:hover { transform: scale(1.12); }

@media (max-width: 768px) {
  .title-bar { top: 8px; padding: 8px 16px; width: 92%; }
  .title-bar h2 { font-size: 14px; }
  .stay-panel { display: none; }
}
</style>
</head>
<body>
<div id="map"></div>

<div class="title-bar">
  <h2>🗺️ 昆山市外办 · 德国开姆尼茨市 公务出访路线</h2>
  <div class="subtitle">2026年10月21日 — 10月24日 · 4天 · 上海↔法兰克福↔开姆尼茨</div>
</div>

<div class="legend">
  <div class="legend-title">图例</div>
  <div class="legend-item"><span class="legend-dot" style="background:#f1c40f;"></span> 首站（上海出发）</div>
  <div class="legend-item"><span class="legend-dot" style="background:#4361ee;"></span> 途经城市</div>
  <div class="legend-item"><span class="legend-dot" style="background:#e74c3c;"></span> 公务/住宿城市</div>
  <div class="legend-item"><span class="legend-line" style="width:24px; background:#4361ee;"></span> 自驾路线</div>
  <div class="legend-item"><span class="legend-line" style="width:24px; background:#e74c3c; border-top:2px dashed #e74c3c; height:0;"></span><span style="margin-left:-4px;"> 国际航班</span></div>
</div>

<div class="stay-panel">
  <div class="stay-title">📅 行程速览</div>
  <div class="stay-item"><span class="stay-dot" style="background:#3498db;"></span> Day1 上海→法兰克福→开姆尼茨</div>
  <div class="stay-item"><span class="stay-dot" style="background:#e74c3c;"></span> Day2 市政府 + 大众汽车工厂</div>
  <div class="stay-item"><span class="stay-dot" style="background:#2ecc71;"></span> Day3 工业大学 + NSH集团</div>
  <div class="stay-item"><span class="stay-dot" style="background:#3498db;"></span> Day4 开姆尼茨→法兰克福→上海</div>
</div>

<script>
(function() {
  // ============================================================
  // City data
  // ============================================================
  const cities = [
    {
      id: 1, name: "上海", nameEn: "Shanghai",
      country: "中国", countryEn: "China",
      lat: 31.2304, lng: 121.4737,
      note: "✈️ 出发城市 · MU219 PVG→FRA 00:15→06:05",
      day: "Day 1 (10/21 周三)",
      type: "start"
    },
    {
      id: 2, name: "法兰克福", nameEn: "Frankfurt",
      country: "德国", countryEn: "Germany",
      lat: 50.1109, lng: 8.6821,
      note: "✈️ 抵达机场 · 转乘车辆前往开姆尼茨（350km/3.5h）",
      day: "Day 1 (10/21 周三)",
      type: "airport"
    },
    {
      id: 3, name: "开姆尼茨", nameEn: "Chemnitz",
      country: "德国", countryEn: "Germany",
      lat: 50.8278, lng: 12.9214,
      note: "🏨 住宿城市 · 卡尔·马克思纪念碑、红塔<br>🏛️ 市政厅 · 🏭 大众汽车工厂<br>🎓 开姆尼茨工业大学 · 🏭 NSH集团",
      day: "Day 1~4 (10/21-24)",
      type: "stay"
    }
  ];

  // ============================================================
  // Route segments
  // ============================================================
  const routes = [
    [0, 1, "flight", "#3498db"],  // Shanghai→Frankfurt
    [1, 2, "drive", "#4361ee"],   // Frankfurt→Chemnitz (outbound)
    [2, 1, "drive", "#4361ee"],   // Chemnitz→Frankfurt (return)
    [1, 0, "flight", "#3498db"],  // Frankfurt→Shanghai
  ];

  // ============================================================
  // POI data - Points of Interest in Chemnitz
  // ============================================================
  const pois = [
    {
      name: "开姆尼茨市政厅",
      nameEn: "Rathaus Chemnitz",
      lat: 50.8329, lng: 12.9209,
      note: "🏛️ Day2 上午 · 拜会市政府国际关系处",
      color: "#e74c3c"
    },
    {
      name: "大众汽车发动机工厂",
      nameEn: "VW Sachsen Chemnitz",
      lat: 50.8065, lng: 12.8795,
      note: "🏭 Day2 下午 · 参观TSI发动机生产线",
      color: "#e74c3c"
    },
    {
      name: "开姆尼茨工业大学",
      nameEn: "TU Chemnitz",
      lat: 50.8387, lng: 12.9250,
      note: "🎓 Day3 上午 · 产学研合作交流",
      color: "#2ecc71"
    },
    {
      name: "NILES-SIMMONS-HEGENSCHEIDT",
      nameEn: "NSH Group",
      lat: 50.8025, lng: 12.8570,
      note: "🏭 Day3 下午 · 高端机床制造参观",
      color: "#2ecc71"
    },
    {
      name: "卡尔·马克思纪念碑",
      nameEn: "Karl Marx Monument",
      lat: 50.8358, lng: 12.9232,
      note: "🗿 开姆尼茨地标 · 高7米，重40吨",
      color: "#f39c12"
    }
  ];

  // ============================================================
  // Init map
  // ============================================================
  const map = L.map('map', {
    center: [50.83, 12.92],
    zoom: 12,
    zoomControl: true
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OSM</a>',
    maxZoom: 18
  }).addTo(map);

  // ============================================================
  // Route lines
  // ============================================================
  routes.forEach(function(rt) {
    const from = cities[rt[0]], to = cities[rt[1]];
    const pts = [[from.lat, from.lng], [to.lat, to.lng]];
    const opts = {
      color: rt[2],
      weight: rt[3] === "flight" ? 2.5 : 4,
      opacity: rt[3] === "flight" ? 0.5 : 0.85,
      dashArray: rt[2] === "flight" ? "12,10" : null
    };
    L.polyline(pts, opts).addTo(map);
  });

  // ============================================================
  // City markers
  // ============================================================
  cities.forEach(function(c) {
    const sz = c.type === "start" ? 38 : 32;
    const bg = c.type === "start" ? "#f1c40f" : c.type === "stay" ? "#e74c3c" : "#4361ee";
    const tc = c.type === "start" ? "#000" : "#fff";
    const fs = c.type === "start" ? 16 : 13;

    const div = L.divIcon({
      className: '',
      html: '<div class="' + (c.type === "start" ? 'marker-start' : 'marker-num') +
            '" style="background:' + bg + ';color:' + tc + ';width:' + sz + 'px;height:' + sz + 'px;font-size:' + fs + 'px;">' + c.id + '</div>',
      iconSize: [sz, sz], iconAnchor: [sz/2, sz/2], popupAnchor: [0, -sz/2-8]
    });

    const pop = '<div class="popup-body">' +
      '<div class="popup-city">' + c.name + ' <span style="font-size:13px;font-weight:normal;color:#888;">' + c.nameEn + '</span></div>' +
      '<div class="popup-country">' + c.country + ' · ' + c.countryEn + '</div>' +
      '<div class="popup-seq"><span>#' + c.id + ' · 第' + c.id + '站</span></div>' +
      '<div class="popup-day"><span>' + c.day + '</span></div>' +
      (c.note ? '<div class="popup-note">' + c.note + '</div>' : '') +
      '</div>';

    L.marker([c.lat, c.lng], {
      icon: div,
      zIndexOffset: c.type === "start" ? 1000 : (c.type === "stay" ? 500 : 0)
    }).addTo(map).bindPopup(pop, { maxWidth: 320 });
  });

  // ============================================================
  // POI markers (small circle markers with tooltips)
  // ============================================================
  pois.forEach(function(p) {
    const pop = '<div class="popup-body">' +
      '<div class="popup-city">' + p.name + ' <span style="font-size:12px;font-weight:normal;color:#888;">' + p.nameEn + '</span></div>' +
      (p.note ? '<div class="popup-note">' + p.note + '</div>' : '') +
      '</div>';

    L.circleMarker([p.lat, p.lng], {
      radius: 10,
      color: p.color,
      fillColor: p.color,
      fillOpacity: 0.7,
      weight: 2,
      opacity: 0.9
    }).addTo(map)
      .bindPopup(pop, { maxWidth: 280 })
      .bindTooltip(p.name, { direction: 'top', offset: [0, -12] });
  });

  // ============================================================
  // Fit bounds
  // ============================================================
  // Focus on Europe portion
  map.fitBounds(L.latLngBounds(L.latLng(49.5, 6), L.latLng(51.5, 14)), { padding: [30,30] });

  // ============================================================
  // Scale
  // ============================================================
  L.control.scale({ position: 'bottomleft', metric: true, imperial: false }).addTo(map);

})();
</script>
</body>
</html>
